name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos:
    name: macOS (${{ matrix.mode }})
    runs-on: macos-15
    timeout-minutes: 15
    # The executor-drain is the unconditional default on this runner (macOS 15,
    # Swift 6 — see `_makeTestExecutorBox`); there is no flag and no wall-clock
    # comparison row (that lived in pre-removal history). BOTH modes are now
    # REQUIRED (no `continue-on-error`):
    #   • SERIAL — the primary deterministic correctness gate (caught the OR-path
    #     race fixed in 497c2ab under serialized execution).
    #   • PARALLEL — validates the framework's parallel-safety claim, a real
    #     differentiator vs. e.g. TCA's enforced `@MainActor`. It was informational
    #     while a small `waitUntil`-based tail flaked on the small runners; both
    #     causes are now fixed (design note Updates 22–24): `testObservedStream`'s
    #     never-true wait fails catchably so `withKnownIssue` absorbs it, and
    #     `testSharedDependency` awaits its shared-dep observations reactively up
    #     front instead of via teardown timing. Verified green across repeated CI
    #     runs, so it now blocks merges too.
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: parallel
            flag: --parallel
          - mode: serial
            flag: --no-parallel
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Build and test (${{ matrix.mode }})
        # `--parallel` validates the framework's parallel-safety claim — a real
        # differentiator vs. e.g. TCA's enforced `@MainActor`. `--no-parallel` is
        # the deterministic regression gate (caught the OR-path race in 497c2ab).
        # `fail-fast: false` so one mode's flake doesn't cancel the other's signal.
        #
        # `SWIFT_MODEL_TIMEOUT_SCALE=3` multiplies all test-infrastructure budgets
        # (expect/settle 5 s → 15 s; cleanup settle 25 s → 75 s; trait cap 30 s →
        # 90 s; meta-test bounds scale too). The small CI runners stall under
        # saturation; locally tests use scale=1 (default) for fast feedback.
        #
        # Benchmarks live in `SwiftModelBenchmarkTests` (skipped from CI; run via
        # `swift test --filter SwiftModelBenchmarkTests`).
        env:
          SWIFT_MODEL_TIMEOUT_SCALE: "3"
        run: swift test ${{ matrix.flag }} --skip SwiftModelBenchmarkTests

  linux:
    name: Linux (${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # See the macOS job: the drive is the unconditional default (Swift 6.3
    # container). BOTH modes are now REQUIRED — serial is the deterministic gate,
    # and parallel (formerly informational while the `waitUntil` tail flaked on
    # the 2-vCPU container) is now green after the Update 22–24 fixes, so it
    # blocks merges too.
    container:
      image: swift:6.3.0
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: parallel
            flag: --parallel
          - mode: serial
            flag: --no-parallel
    steps:
      - uses: actions/checkout@v6
      - name: Cache Swift build artifacts
        uses: actions/cache@v5
        with:
          path: .build
          # `Package.resolved` isn't committed (no `hashFiles` input there), so
          # we hash `Package.swift` instead — that's what determines the
          # resolved dependency graph. Without this, every job hashed to the
          # same key and a stale `.build/workspace-state.json` from a previous
          # resolve (e.g. an older `swift-custom-dump` revision with a
          # different trait declaration) survived across runs and produced
          # spurious trait-resolution errors. The `v2-` prefix is a manual
          # cache-bust — bump it whenever a stale-cache failure recurs.
          # `restore-keys` is intentionally narrowed to the Package.swift hash
          # too so partial-prefix matches can't pull in a workspace state from
          # an older manifest. With this scheme, every Package.swift change
          # forces a full re-resolve (the build is incremental anyway).
          # Mode is part of the key so parallel/serial don't fight over
          # build artifacts (different test ordering can trigger different
          # incremental rebuild patterns).
          key: ${{ runner.os }}-swift-6.3-${{ matrix.mode }}-v2-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.3-${{ matrix.mode }}-v2-${{ hashFiles('Package.swift') }}
      - name: Build and test (${{ matrix.mode }})
        # See the macOS job for the dual-mode rationale and
        # `SWIFT_MODEL_TIMEOUT_SCALE` justification.
        #
        # Linux goes through `scripts/ci-test` rather than calling `swift test`
        # directly. On Linux, swift-syntax's compiler-plugin message handler
        # intermittently logs `Internal Error: DecodingError … Corrupted JSON …
        # unexpected end of file` during macro expansion (a truncated/EOF frame
        # on the compiler ↔ macro-plugin IPC pipe). It is emitted on essentially
        # every Linux build — including passing ones — but can occasionally make
        # `swift test` exit non-zero even though the build compiled and EVERY
        # test passed. That is exactly how `Linux (parallel)` flaked on
        # run 28446231009 (`Test run with 764 tests … passed`, yet job failed).
        # An upstream toolchain artifact, not a SwiftModel bug. The wrapper
        # treats "build compiled + test run passed + zero real failures" as
        # success and still fails hard on any genuine test/build failure — it
        # does NOT retry or mask real failures. macOS is unaffected (zero
        # occurrences), so it keeps calling `swift test` directly.
        env:
          SWIFT_MODEL_TIMEOUT_SCALE: "3"
        run: scripts/ci-test ${{ matrix.flag }} --skip SwiftModelBenchmarkTests

  android:
    name: Android (aarch64)
    # Compile-only cross-compile check for aarch64-unknown-linux-android28.
    # No test execution on Android — see the comment block below for why.
    #
    # History:
    #   • `13961d6` switched this job to `skiptools/swift-android-action@v2`,
    #     which builds + pushes test binaries to an emulator and runs them.
    #     That worked at the time but consistently fails on this branch
    #     against Swift 6.3 with errors of the form:
    #       error: Failed opening
    #       `.build/<triple>/debug/index/store/v5/units/<File>.swift.o-<hash>`
    #       No such file or directory
    #     emitted while generating `all-discovered-tests.swift`. The Swift
    #     6.3 cross-compiler writes index units to the HOST store
    #     (`x86_64-unknown-linux-gnu`), but SwiftPM's package-level
    #     test-discovery looks for them in the TARGET store
    #     (`x86_64-unknown-linux-android28`) — they're never found.
    #   • The manual workaround below (seed the target store from the host
    #     store before cross-compiling) is what was working pre-`13961d6`.
    #     We've restored it. Once Swift's cross-compiler is fixed to write
    #     units to the target store directly, this whole compile-only job
    #     can be replaced again by `swift-android-action` for real test
    #     execution on the emulator.
    #
    # Run on Linux: canImport(ObjectiveC/AppKit/UIKit) is false on Linux,
    # which correctly matches the Android target and avoids false-positive
    # compilation errors that occur when cross-compiling from macOS (where
    # those checks evaluate against the macOS host instead of the Android
    # target).
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: swift:6.3.0
    steps:
      - uses: actions/checkout@v6

      - name: Install Android NDK r27d and Swift Android SDK
        run: |
          apt-get update -qq
          apt-get install -qq -y unzip wget 2>/dev/null
          wget -q "https://dl.google.com/android/repository/android-ndk-r27d-linux.zip" -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /opt
          export ANDROID_NDK_HOME=/opt/android-ndk-r27d
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> "$GITHUB_ENV"

          swift sdk install \
            "https://download.swift.org/swift-6.3-release/android-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_android.artifactbundle.tar.gz" \
            --checksum 2f2942c4bcea7965a08665206212c66991dabe23725aeec7c4365fc91acad088
          # swift sdk install uses FileManager.homeDirectoryForCurrentUser (getpwuid)
          # on Linux, which returns /root regardless of the $HOME env var. GitHub
          # Actions containers set HOME=/github/home, but the bundle always lands
          # in /root/.swiftpm/swift-sdks/ when running as the root container user.
          SETUP_SCRIPT=$(find /root/.swiftpm/swift-sdks -name "setup-android-sdk.sh" 2>/dev/null | head -1)
          if [ -z "$SETUP_SCRIPT" ]; then
            echo "setup-android-sdk.sh not found. Bundle contents:"; find /root/.swiftpm | head -20; exit 1
          fi
          bash "$SETUP_SCRIPT"

      - name: Build Linux tests (seed index store for Android cross-compilation)
        # Workaround for a Swift 6.3 cross-compilation bug: the cross-compiler
        # writes index units to the HOST store instead of the Android store.
        # Building for Linux first seeds those units so that SPM's test-discovery
        # step can find them when cross-compiling for Android (next step copies
        # them to the Android index store path).
        run: swift build --build-tests

      - name: Seed Android index store from Linux build
        run: |
          LINUX_STORE=".build/x86_64-unknown-linux-gnu/debug/index/store/v5"
          ANDROID_STORE=".build/aarch64-unknown-linux-android28/debug/index/store/v5"
          mkdir -p "$ANDROID_STORE/units" "$ANDROID_STORE/records"
          cp "$LINUX_STORE/units/"* "$ANDROID_STORE/units/"
          for subdir in "$LINUX_STORE/records/"*/; do
            name=$(basename "$subdir")
            mkdir -p "$ANDROID_STORE/records/$name"
            cp "$subdir"* "$ANDROID_STORE/records/$name/"
          done

      - name: Build SwiftModelTests for Android (aarch64)
        # ANDROID_NDK_ROOT must be unset: it overrides ANDROID_NDK_HOME and
        # breaks the SDK bundle's NDK path resolution.
        run: |
          unset ANDROID_NDK_ROOT
          swift build \
            --swift-sdk aarch64-unknown-linux-android28 \
            --build-tests

  wasm:
    name: WASM (wasm32-unknown-wasip1)
    # Run on Linux: same reasoning as Android — host-side canImport checks
    # (ObjectiveC, AppKit, UIKit) evaluate against the container OS, which
    # correctly reflects the WASM target's behaviour.
    runs-on: ubuntu-latest
    timeout-minutes: 7
    container:
      image: swift:6.3.0
    steps:
      - uses: actions/checkout@v6

      - name: Install Swift WASM SDK
        run: |
          swift sdk install \
            "https://download.swift.org/swift-6.3-release/wasm-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_wasm.artifactbundle.tar.gz" \
            --checksum 9fa4016ee632c7e9e906608ec3b55cf13dfc4dff44e47574c5af58064dc33fd9

      - name: Build SwiftModel for WASM (compile check)
        # `SWIFTPM_TARGET_WASI=1` tells `Package.swift` to drop every test
        # target except `SwiftModelTests` — see the manifest comment at the
        # bottom of `Package.swift`. The lever exists because WASI's no-
        # dynamic-libraries rule made the package's test-executable link fail
        # whenever `IssueReportingTestSupport` (a `type:.dynamic` product)
        # was reachable from the test graph.
        env:
          SWIFTPM_TARGET_WASI: "1"
        run: |
          swift build \
            --swift-sdk swift-6.3-RELEASE_wasm \
            --target SwiftModel

      - name: Build SwiftModelTests for WASM (compile check)
        # See the previous step for `SWIFTPM_TARGET_WASI` rationale.
        env:
          SWIFTPM_TARGET_WASI: "1"
        run: |
          swift build \
            --swift-sdk swift-6.3-RELEASE_wasm \
            --target SwiftModelTests

      # Actually running the WASM test bundle is still blocked at the
      # link stage by SwiftPM auto-materialising the
      # `IssueReportingTestSupport` (`type:.dynamic`) product into any test
      # build plan, regardless of platform conditions on consumer-side
      # target deps. The workaround needs xctest-dynamic-overlay's manifest
      # to drop the product when an env signal is set; that change has been
      # prepared on the fork branch
      #   https://github.com/mansbernhardt/swift-issue-reporting/tree/suppress-dynamic-on-wasi
      # but can't be wired in here today because the fork's URL basename
      # is `swift-issue-reporting` and SwiftPM derives package identity
      # from URL basename — pulling the fork creates a duplicate-product
      # identity conflict with the upstream `xctest-dynamic-overlay`
      # identity that comes in transitively via swift-clocks etc.
      #
      # Open the upstream PR on pointfreeco/swift-issue-reporting; once
      # merged + released, we get the env lever without an identity rename.
