name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos:
    name: macOS
    runs-on: macos-15
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Build and test
        # Run tests serially (--no-parallel) to avoid cooperative thread-pool
        # saturation on the 3-core macos-15-arm64 runner. Same rationale as the
        # Linux job below — the tests themselves run parallel-clean on
        # well-provisioned machines (local development, x100 stress loops via
        # `scripts/test --loop`), but the small CI box can't absorb 700-way
        # in-process Task fan-out.
        #
        # We tried `--parallel --num-workers 6` first; turns out `--num-workers`
        # is a SwiftPM process-orchestration flag for fan-out across multiple
        # test executables, not an in-process Task cap. Swift-testing inside a
        # single process still spawns every @Test under one
        # `withDiscardingTaskGroup` with no worker bound. Serial on CI is the
        # cleanest workaround until swift-testing exposes per-process Task
        # capping. Intra-test race coverage (a model's `node.task` / `forEach` /
        # `onChange` racing the test body) is preserved at any worker count ≥ 1.
        # Benchmarks live in `SwiftModelBenchmarkTests` (split off from
        # `SwiftModelTests`) — skipped from regular CI runs. Run them on-demand
        # via `swift test --filter SwiftModelBenchmarkTests` or the
        # `swift-model-benchmarks` Xcode test plan.
        run: swift test --no-parallel --skip SwiftModelBenchmarkTests

  linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: swift:6.3.0
    steps:
      - uses: actions/checkout@v6
      - name: Cache Swift build artifacts
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-swift-6.3-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.3-
      - name: Build and test
        # Run tests serially (--no-parallel) to avoid cooperative thread-pool saturation
        # on the 2-vCPU Linux runner. Parallel race-condition coverage is provided by macOS.
        # Benchmarks (`SwiftModelBenchmarkTests`) are skipped — same rationale as the
        # macOS job; run on-demand via the `swift-model-benchmarks` Xcode test plan.
        run: swift test --no-parallel --skip SwiftModelBenchmarkTests

  android:
    name: Android (aarch64, emulator)
    # `skiptools/swift-android-action` does the heavy lifting: installs the
    # Swift Android SDK + NDK, boots an Android emulator, cross-compiles the
    # package, pushes the test binary + Swift runtime .so files via adb, and
    # runs the swift-testing harness on the emulator. This replaces the manual
    # SDK install + index-store seed dance we used to compile-only-check.
    #
    # Test running on emulator confirmed reproducible behaviour beyond just
    # compilation. Concrete win: cross-@Model `Observed` propagation was
    # claimed to fail on Android — local verification + this CI run now
    # exercise it on real Android.
    #
    # Runs on `ubuntu-latest` (not in the swift:6.3.0 container) because the
    # action manages its own toolchain and emulator/qemu host. `free-disk-space`
    # frees ~14 GB on the runner — the emulator image plus Swift SDK plus
    # NDK plus build outputs comfortably fit otherwise but disk pressure
    # causes intermittent failures.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Test Swift package on Android
        uses: skiptools/swift-android-action@v2
        with:
          swift-version: '6.3'
          android-api-level: 28
          # run-tests defaults to true.
          free-disk-space: true

  wasm:
    name: WASM (wasm32-unknown-wasip1)
    # Run on Linux: same reasoning as Android — host-side canImport checks
    # (ObjectiveC, AppKit, UIKit) evaluate against the container OS, which
    # correctly reflects the WASM target's behaviour.
    runs-on: ubuntu-latest
    timeout-minutes: 7
    container:
      image: swift:6.3.0
    steps:
      - uses: actions/checkout@v6

      - name: Install Swift WASM SDK
        run: |
          swift sdk install \
            "https://download.swift.org/swift-6.3-release/wasm-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_wasm.artifactbundle.tar.gz" \
            --checksum 9fa4016ee632c7e9e906608ec3b55cf13dfc4dff44e47574c5af58064dc33fd9

      - name: Build SwiftModel for WASM (compile check)
        # Full test execution is blocked by `IssueReportingTestSupport`
        # (xctest-dynamic-overlay) being `type:.dynamic`, which the WASM SDK
        # can't link. `SwiftModelSnapshotTests` and `SwiftModelBenchmarkTests`
        # are split off from `SwiftModelTests` so SnapshotTesting's Apple-only
        # types are no longer on the main test target's link path — they only
        # block their own dedicated test targets — but the
        # `IssueReportingTestSupport` blocker remains for any test target.
        # We compile-check the main library target only. The Android job DOES
        # execute tests on an emulator now (via `skiptools/swift-android-action`),
        # so this is the only "compile-only" target left.
        run: |
          swift build \
            --swift-sdk swift-6.3-RELEASE_wasm \
            --target SwiftModel
