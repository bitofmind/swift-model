name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Build and test
        run: swift test

  linux:
    name: Linux (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        swift: ["6.2"]
    container:
      image: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: swift test

  android:
    name: Android (aarch64)
    # Run on Linux: canImport(ObjectiveC/AppKit/UIKit) is false on Linux, which
    # correctly matches the Android target and avoids false-positive compilation
    # errors that occur when cross-compiling from macOS (where those checks
    # evaluate against the macOS host instead of the Android target).
    runs-on: ubuntu-latest
    container:
      image: swift:6.3
    steps:
      - uses: actions/checkout@v4

      - name: Install Android NDK r27d and Swift Android SDK
        run: |
          apt-get update -qq
          apt-get install -qq -y unzip wget 2>/dev/null
          wget -q "https://dl.google.com/android/repository/android-ndk-r27d-linux.zip" -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /opt
          export ANDROID_NDK_HOME=/opt/android-ndk-r27d
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> "$GITHUB_ENV"

          swift sdk install \
            "https://download.swift.org/swift-6.3-release/android-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_android.artifactbundle.tar.gz" \
            --checksum 2f2942c4bcea7965a08665206212c66991dabe23725aeec7c4365fc91acad088
          # GitHub Actions containers set HOME=/github/home rather than /root,
          # so locate the setup script dynamically instead of hardcoding the path.
          BUNDLE_DIR="$HOME/.swiftpm/swift-sdks/swift-6.3-RELEASE_android.artifactbundle"
          SETUP_SCRIPT=$(find "$BUNDLE_DIR" -name "setup-android-sdk.sh" 2>/dev/null | head -1)
          if [ -z "$SETUP_SCRIPT" ]; then
            echo "setup-android-sdk.sh not found. Bundle contents:"; find "$BUNDLE_DIR" | head -20; exit 1
          fi
          bash "$SETUP_SCRIPT"

      - name: Build Linux tests (seed index store for Android cross-compilation)
        # Workaround for a Swift 6.3 cross-compilation bug: the cross-compiler
        # writes index units to the HOST store instead of the Android store.
        # Building for Linux first seeds those units so that SPM's test-discovery
        # step can find them when cross-compiling for Android (next step copies
        # them to the Android index store path).
        run: swift build --build-tests

      - name: Seed Android index store from Linux build
        run: |
          LINUX_STORE=".build/x86_64-unknown-linux-gnu/debug/index/store/v5"
          ANDROID_STORE=".build/aarch64-unknown-linux-android28/debug/index/store/v5"
          mkdir -p "$ANDROID_STORE/units" "$ANDROID_STORE/records"
          cp "$LINUX_STORE/units/"* "$ANDROID_STORE/units/"
          for subdir in "$LINUX_STORE/records/"*/; do
            name=$(basename "$subdir")
            mkdir -p "$ANDROID_STORE/records/$name"
            cp "$subdir"* "$ANDROID_STORE/records/$name/"
          done

      - name: Build SwiftModelTests for Android (aarch64)
        # ANDROID_NDK_ROOT must be unset: it overrides ANDROID_NDK_HOME and
        # breaks the SDK bundle's NDK path resolution.
        run: |
          unset ANDROID_NDK_ROOT
          swift build \
            --swift-sdk aarch64-unknown-linux-android28 \
            --build-tests
